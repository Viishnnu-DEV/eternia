<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EED7A1" />
      <stop offset="50%" stop-color="#D08327" />
      <stop offset="100%" stop-color="#A86415" />
    </linearGradient>
  </defs>

  <!-- Delicate outer dotted ring -->
  <circle
    cx="50"
    cy="50"
    r="45"
    stroke="url(#logo-gold-grad)"
    stroke-width="1.2"
    stroke-dasharray="3 3"
    opacity="0.6"
  />

  <!-- Solid outer boundary circle -->
  <circle
    cx="50"
    cy="50"
    r="41"
    stroke="url(#logo-gold-grad)"
    stroke-width="0.8"
    opacity="0.8"
  />

  <!-- Left Ring -->
  <ellipse
    cx="43"
    cy="50"
    rx="14"
    ry="14"
    stroke="url(#logo-gold-grad)"
    stroke-width="1.5"
    transform="rotate(-15 43 50)"
    opacity="0.9"
  />

  <!-- Right Ring -->
  <ellipse
    cx="57"
    cy="50"
    rx="14"
    ry="14"
    stroke="url(#logo-gold-grad)"
    stroke-width="1.5"
    transform="rotate(15 57 50)"
    opacity="0.9"
  />

  <!-- Central 'E' Monogram in Serif -->
  <text
    x="50.5"
    y="58"
    fill="url(#logo-gold-grad)"
    font-size="24"
    font-weight="bold"
    font-family="'Ethdown', 'Georgia', serif"
    text-anchor="middle"
    letter-spacing="0"
  >E</text>

  <!-- Top Sparkle -->
  <path
    d="M 50 18 L 51 22 L 55 23 L 51 24 L 50 28 L 49 24 L 45 23 L 49 22 Z"
    fill="url(#logo-gold-grad)"
  />
  
  <!-- Left Accent Dot -->
  <circle cx="20" cy="50" r="1.5" fill="url(#logo-gold-grad)" />
  
  <!-- Right Accent Dot -->
  <circle cx="80" cy="50" r="1.5" fill="url(#logo-gold-grad)" />
</svg>
